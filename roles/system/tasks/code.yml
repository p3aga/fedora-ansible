---
- name: Configura o repositório do vscode
  ansible.builtin.copy:
    src: vscode.repo
    dest: /etc/yum.repos.d/vscode.repo
    mode: 0644
    owner: root
    group: root
  become: true

- name: Instala o vscode
  ansible.builtin.dnf:
    name: code
    state: present
    update_cache: true
  become: true
