---
- name: Provision system
  hosts: localhost
  become: true
  roles:
    - { role: clean, tags: [packages] }
    - { role: rpmfusion, tags: [repos] }
    - { role: codecs, tags: [codecs, packages] }
    - { role: packages, tags: [packages] }
    - { role: flatpaks, tags: [flatpaks, packages] }
    - { role: brew, tags: [brew, packages] }
    - { role: gnome, tags: [gnome, packages] }
    - { role: vscode, tags: [vscode, packages] }
    - { role: libvirt, tags: [libvirt] }
    - { role: services, tags: [services] }
